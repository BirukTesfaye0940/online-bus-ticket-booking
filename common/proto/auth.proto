syntax = "proto3";

package auth;

option go_package = "github.com/biruk/bus-ticket/common/proto/auth";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_PASSENGER = 1;
  ROLE_STAFF = 2;
  ROLE_BUS_WORKER_ADMIN = 3;
  ROLE_SUPER_ADMIN = 4;
}

message User {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string phone_number = 4;
  Role role = 5;
  string created_at = 6;
  string updated_at = 7;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
  string phone_number = 4;
  Role role = 5; // Restricted: usually defaults to PASSENGER, or requires higher role to create STAFF/ADMIN
}

message RegisterResponse {
  User user = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  User user = 2;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  Role role = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}
